<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmação de Presença</title>
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>
  <main class="container">
    <section id="blocked" class="card hidden">
      <h1>Acesso inválido</h1>
      <p>Você precisa acessar este site pelo link de confirmação com o código correto.</p>
      <p>Exemplo: <strong>?code=HT854S</strong></p>
    </section>

    <section id="confirm" class="card hidden">
      <h1>Confirme sua Presença</h1>
      <p>Obrigado por confirmar sua presença no nosso casamento.</p>
      <div id="confirm-panel" class="confirm-panel">
        <div class="input-row">
          <div class="input-item">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome" />
          </div>
          <div class="input-item">
            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" name="sobrenome" placeholder="Seu sobrenome" />
          </div>
        </div>

        <div class="button-group">
          <button id="confirm-button" type="button">Confirmo</button>
          <button id="decline-button" type="button" class="secondary">Não Confirmo</button>
        </div>
      </div>

      <div id="success-message" class="success hidden"></div>
    </section>
  </main>
  <script src="static/js/script.js"></script>
</body>
</html>
